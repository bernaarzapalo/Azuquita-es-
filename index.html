<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glucosa App</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>📊 Glucosa App</h1>
    <div class="card">
        <h3>Datos</h3>
        <input id="glucosa" placeholder="Glucosa"><br>
        <input id="carbs" placeholder="Carbohidratos"><br>
    </div>
    <div class="card">
        <h3>Configuración</h3>
        <input id="ratio" placeholder="Ratio"><br>
        <input id="factor" placeholder="Factor"><br>
        <input id="objetivo" placeholder="Objetivo"><br>
    </div>
    <button onclick="guardar()">Guardar</button>
    <button onclick="borrar()">Borrar historial</button>
    <div class="card">
        <h3 id="resultado">---</h3>
        <small>⚠️ Estimación, consulta con tu médico</small>
    </div>
    <div class="card">
        <canvas id="grafica"></canvas>
    </div>
    <div class="card">
        <h3>Historial</h3>
        <ul id="historial"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
